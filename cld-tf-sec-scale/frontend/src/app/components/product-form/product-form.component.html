<div class="container">
  <h2>{{ isEdit ? 'Edit Product' : 'New Product' }}</h2>
  <div *ngIf="error" class="error">{{ error }}</div>

  <form (ngSubmit)="save()" #f="ngForm">
    <div class="field">
      <label for="name">Name *</label>
      <input id="name" name="name" [(ngModel)]="product.name" required placeholder="Product name" />
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" name="description" [(ngModel)]="product.description" rows="3" placeholder="Short description"></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label for="price">Price ($) *</label>
        <input id="price" name="price" type="number" step="0.01" min="0" [(ngModel)]="product.price" required />
      </div>
      <div class="field">
        <label for="stock">Stock *</label>
        <input id="stock" name="stock" type="number" min="0" [(ngModel)]="product.stock" required />
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving || f.invalid">
        {{ saving ? 'Saving…' : (isEdit ? 'Update' : 'Create') }}
      </button>
      <button type="button" class="btn btn-cancel" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
